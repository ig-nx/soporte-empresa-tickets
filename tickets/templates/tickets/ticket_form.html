{% extends "base.html" %}
{% block title %}Ticket{% endblock %}
{% block content %}
<div class="card">
    <div class="card-body">
        <h3 class="mb-3">
            {% if object %}Editar ticket #{{ object.id }}{% else %}Nuevo ticket{% endif %}
        </h3>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="d-flex gap-2">
                <button class="btn btn-success" type="submit">
                    {% if object %}Guardar cambios{% else %}Crear ticket{% endif %}
                </button>
                <a class="btn btn-secondary" href="{% url 'ticket_list' %}">Volver</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
